<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Area Quadrada</title>
    <link rel="stylesheet" href="/assets/css/calculadora.css">
</head>

<body>
    <div class="container">
        <div class="calc-area">
            <input type="number" name="base" id="base" placeholder="Digite a Base">
            <input type="number" name="altura" id="altura" placeholder="Digite a Altura">
            <button id="area-button">Calcular Área</button>
            <div id="show-result"></div>
        </div>
        <div id="tests-container">
            <button id="calc-test">Testar Calculo</button>
            <button id="element-test">Testar Elemento</button>
            <div id="show-tests"></div>
        </div>
    </div>

    <script src="/assets/js/calculadora.js"></script>
    <script src="/assets/js/test/calculadora.test.js"></script>
</body>

</html>
